name: auto_l10n
description: >
  Automatic Flutter app translation with zero code changes.
  One line in main.dart. Supports DeepL, MyMemory, Lingva, Google Translate, and custom translators.
version: 0.3.1
homepage: https://github.com/createev/auto_l10n
repository: https://github.com/createev/auto_l10n
issue_tracker: https://github.com/createev/auto_l10n/issues
license: MIT

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

executables:
  auto_l10n: auto_l10n

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.3.0
  http: ^1.2.0
  analyzer: '>=7.7.1 <11.0.0'

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
