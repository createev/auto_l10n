name: auto_l10n
description: >
  Automatic Flutter app translation with zero code changes.
  One line in main.dart. Supports DeepL, Google Translate, and custom translators.
version: 0.1.0
homepage: https://github.com/yourusername/auto_l10n

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.3.0
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
